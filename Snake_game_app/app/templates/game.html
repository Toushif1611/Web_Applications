{% extends 'base.html' %}

{% block title %}Snake Game{% endblock %}

{% block content %}
<div class="game-shell">
    <section class="game-panel">
        <div class="game-header">
            <div>
                <span class="label">Score</span>
                <span id="score" class="value">0</span>
            </div>
            <div>
                <span class="label">Speed</span>
                <span id="speed" class="value">10</span>
            </div>
            <div>
                <span class="label">Status</span>
                <span id="status" class="value">Ready</span>
            </div>
        </div>
        <div class="menu-screen" id="menuScreen">
            <div class="menu-card">
                <h2>Snake Game Menu</h2>
                <div class="menu-buttons">
                    <button id="menuPlayBtn" class="btn">Play</button>
                    <button id="menuContinueBtn" class="btn">Continue</button>
                    <button id="menuQuitBtn" class="btn btn-danger">Quit</button>
                </div>
                <div class="scores-panel" id="scoresPanel">
                    <div class="score-row">
                        <span>Current Score</span>
                        <strong id="menuCurrentScore">0</strong>
                    </div>
                    <div class="score-row">
                        <span>Best Score</span>
                        <strong id="menuBestScore">0</strong>
                    </div>
                </div>
                <p class="menu-description">Use these controls to start, continue, view your score, or quit the game.</p>
            </div>
        </div>
        <canvas id="gameCanvas" width="600" height="450"></canvas>
        
    </section>
</div>
<script src="{{ url_for('static', filename='JS/script.js') }}"></script>
{% endblock %}
